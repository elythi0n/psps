name: Release

on:
  push:
    tags:
      - 'v*'

# The goreleaser action needs to create GitHub releases and upload assets;
# everything else stays read-only.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # goreleaser uses git history to generate the changelog. Default
          # checkout depth is 1 which would emit an empty changelog.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
